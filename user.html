<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOWAIT · 사용자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nw.css">
</head>
<body>
<div id="cfgWarn" class="hide"></div>
<div class="mobile">
  <div class="topbar">
    <a class="back" href="index.html">← 홈</a>
    <div class="lg">NO<span class="w">WAIT</span></div>
    <div class="uid" id="userUid">·</div>
  </div>

  <!-- 홈 -->
  <div id="u-home" class="scr on">
    <div class="page">
      <div class="h1">지금 우리,<br>갈 수 있는 곳?</div>
      <div class="muted" style="margin-top:8px">인원과 업종만 고르면 30초 안에 답이 와요.</div>
      <div class="field"><div class="field-lb">몇 명이세요?</div><div class="chips" id="partyChips"></div></div>
      <div class="field"><div class="field-lb">어디 가요?</div><div class="chips" id="catChips"></div></div>
      <div class="locbox"><div class="pin">📍</div>
        <div class="txt"><b id="locName">위치 확인 중…</b><small id="locCoord">--</small></div>
        <button onclick="getLoc()">새로고침</button></div>
      <div id="penaltyBanner"></div>
      <button class="cta" id="callBtn" onclick="startCall()" disabled>지금 호출하기</button>
      <div class="demo-hint"><b>테스트 팁</b> · 다른 탭에서 <b>매장용</b>을 열고 "데모 매장 생성"을 눌러두면 혼자서도 호출이 전달됩니다.</div>
    </div>
  </div>

  <!-- 탐색 -->
  <div id="u-search" class="scr">
    <div class="searching">
      <div class="radar"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="core">📡</div></div>
      <div class="sr-timer mono" id="srTimer">0:60</div>
      <div class="sr-status" id="srStatus">주변 매장에 요청을 보내는 중…</div>
      <div class="sr-cnt">응답 <b id="srCount">0</b>곳 도착</div>
      <div class="reslist" id="resList"></div>
      <button class="cta ghost" style="margin-top:22px" onclick="cancelCall()">취소</button>
    </div>
  </div>

  <!-- 매칭 완료 -->
  <div id="u-matched" class="scr">
    <div class="matched">
      <div class="match-hero">
        <div class="ok-ic">✓</div>
        <h2 id="mName">매칭 완료</h2>
        <div class="sub" id="mSub">지금 바로 입장 가능합니다</div>
        <div class="countdown"><div class="lb">입장 마감까지</div><div class="t mono" id="mTimer">25:00</div></div>
      </div>
      <div class="bizdetail" id="mDetail"></div>
      <button class="cta" onclick="arrive()">✓ 도착 완료</button>
      <button class="cta danger" style="margin-top:10px" onclick="cancelMatch()">매칭 취소</button>
      <div class="demo-hint" style="margin-top:16px">제한 시간 안에 <b>도착 완료</b>를 누르지 않으면 노쇼 처리되어 30분간 호출이 제한됩니다.</div>
    </div>
  </div>

  <!-- MY -->
  <div id="u-my" class="scr">
    <div class="page">
      <div class="h1">MY</div>
      <div id="myStatus"></div>
      <div class="h2" style="margin-top:26px">호출 기록</div>
      <div id="myHist"><div class="muted">아직 기록이 없어요.</div></div>
    </div>
  </div>

  <div class="bnav">
    <button id="n-home" class="on" onclick="uGo('u-home','n-home')"><span class="bi">🔍</span>호출</button>
    <button id="n-my" onclick="uGo('u-my','n-my')"><span class="bi">👤</span>MY</button>
  </div>
</div>
<div id="toast"></div>

<script src="nw-core.js"></script>
<script>
const {$,toast,fmtT,haversine,distLabel,nowMs,tsMs,catOf,CATS,PARTY,CALL_TTL,MATCH_TTL,PENALTY,FALLBACK}=NW;
let myLoc=null, sel={party:null,cat:null};
let curCallId=null, callUnsub=null, callTimer=null, matchTimer=null, responses=[];

function subShow(id){document.querySelectorAll('.mobile>.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');window.scrollTo(0,0);}
window.uGo=(id,nav)=>{subShow(id);document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('on'));$(nav).classList.add('on');if(id==='u-my')renderMy();};

(async function init(){
  buildChips(); getLoc();
  await NW.ensureAuth();
  $('userUid').textContent = NW.uid?('ID '+NW.uid.slice(0,6)):'local';
  refreshPenalty();
})();

function buildChips(){
  $('partyChips').innerHTML=PARTY.map(p=>`<button class="chip" data-p="${p}" onclick="pickParty(${p})">${p}${p===6?'+':''}명</button>`).join('');
  $('catChips').innerHTML=CATS.map(c=>`<button class="chip" data-c="${c.k}" onclick="pickCat('${c.k}')">${c.e} ${c.n}</button>`).join('');
}
window.pickParty=p=>{sel.party=p;document.querySelectorAll('#partyChips .chip').forEach(b=>b.classList.toggle('on',+b.dataset.p===p));chkReady();};
window.pickCat=k=>{sel.cat=k;document.querySelectorAll('#catChips .chip').forEach(b=>b.classList.toggle('on',b.dataset.c===k));chkReady();};
function chkReady(){$('callBtn').disabled=!(sel.party&&sel.cat&&myLoc&&NW.cfgOk&&!penalActive());}

window.getLoc=()=>{
  $('locName').textContent='위치 확인 중…';
  if(!navigator.geolocation){applyLoc(FALLBACK);return;}
  navigator.geolocation.getCurrentPosition(
    p=>applyLoc({lat:p.coords.latitude,lng:p.coords.longitude,name:'현재 위치'}),
    ()=>{applyLoc(FALLBACK);toast('위치 권한이 없어 강남역 기준으로 설정했어요.');},
    {enableHighAccuracy:true,timeout:8000});
};
function applyLoc(l){myLoc=l;$('locName').textContent=l.name;$('locCoord').textContent=l.lat.toFixed(4)+', '+l.lng.toFixed(4);chkReady();}

let penaltyUntil=0;
async function refreshPenalty(){
  if(!NW.cfgOk||!NW.uid)return;
  const {doc,getDoc}=NW.fb;
  const s=await getDoc(doc(NW.db,'nw_users',NW.uid));
  penaltyUntil=s.exists()?tsMs(s.data().penaltyUntil):0;
  renderPenaltyBanner();
}
function penalActive(){return penaltyUntil>nowMs();}
function renderPenaltyBanner(){
  const el=$('penaltyBanner');
  if(penalActive()){const left=Math.ceil((penaltyUntil-nowMs())/60000);
    el.innerHTML=`<div class="penalty" style="margin-top:20px"><div class="pi">⛔</div><div><b>노쇼 패널티 적용 중</b><div class="pt">약 ${left}분 후 해제</div></div></div>`;}
  else el.innerHTML='';
  chkReady();
}

window.startCall=async()=>{
  if(!NW.cfgOk){toast('Firebase config를 먼저 설정하세요.');return;}
  if(penalActive()){toast('패널티 적용 중입니다.');return;}
  if(!(sel.party&&sel.cat&&myLoc))return;
  const {collection,addDoc,serverTimestamp,Timestamp}=NW.fb;
  const expires=Timestamp.fromMillis(nowMs()+CALL_TTL*1000);
  const ref=await addDoc(collection(NW.db,'nw_calls'),{
    callerId:NW.uid, party:sel.party, cat:sel.cat, lat:myLoc.lat, lng:myLoc.lng,
    status:'searching', createdAt:serverTimestamp(), expiresAt:expires});
  curCallId=ref.id; subShow('u-search');
  $('resList').innerHTML=''; $('srCount').textContent='0';
  listenResponses(); runCallTimer(nowMs()+CALL_TTL*1000);
};
function listenResponses(){
  responses=[];
  const {collection,onSnapshot}=NW.fb;
  callUnsub=onSnapshot(collection(NW.db,'nw_calls',curCallId,'responses'),snap=>{
    responses=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r.type!=='no');
    $('srCount').textContent=responses.length; renderResponses();
  });
}
function renderResponses(){
  const ok=responses.filter(r=>r.type==='ok').sort((a,b)=>a.dist-b.dist);
  const soon=responses.filter(r=>r.type==='soon').sort((a,b)=>a.dist-b.dist);
  let h='';
  if(ok.length)h+=`<div class="grp-lb"><span class="dot" style="background:var(--ok)"></span>지금 가능 ${ok.length}곳</div>`+ok.map(card).join('');
  if(soon.length)h+=`<div class="grp-lb"><span class="dot" style="background:var(--soon)"></span>10분 후 가능 ${soon.length}곳</div>`+soon.map(card).join('');
  $('resList').innerHTML=h;
}
function card(r){const c=catOf(r.cat||sel.cat);
  const badge=r.type==='ok'?'<span class="badge bd-ok">지금 가능</span>':'<span class="badge bd-soon">10분 후</span>';
  return `<div class="bizcard" onclick="selectBiz('${r.id}')"><div class="em">${c.e}</div>
    <div class="info"><b>${r.bizName||'매장'}</b><div class="meta">${distLabel(r.dist)} · ${c.n}</div></div>${badge}</div>`;}

let callEndAt=0;
function runCallTimer(end){callEndAt=end;clearInterval(callTimer);
  const tick=()=>{const left=(callEndAt-nowMs())/1000;$('srTimer').textContent=fmtT(left);
    if(responses.length>0)$('srStatus').textContent='응답이 도착했어요. 매장을 선택하세요.';
    if(left<=0){clearInterval(callTimer);endSearch();}};
  tick();callTimer=setInterval(tick,250);}
async function endSearch(){
  if(!curCallId)return;
  if(responses.length===0){
    const {doc,updateDoc}=NW.fb;
    await updateDoc(doc(NW.db,'nw_calls',curCallId),{status:'expired'}).catch(()=>{});
    cleanupCall();toast('주변에서 응답이 없었어요. 다시 시도해 주세요.');subShow('u-home');
  }
}
window.cancelCall=async()=>{
  if(curCallId){const {doc,updateDoc}=NW.fb;await updateDoc(doc(NW.db,'nw_calls',curCallId),{status:'cancelled'}).catch(()=>{});}
  cleanupCall();subShow('u-home');
};
function cleanupCall(){clearInterval(callTimer);if(callUnsub){callUnsub();callUnsub=null;}}

let matchData=null;
window.selectBiz=async(respId)=>{
  const r=responses.find(x=>x.id===respId);if(!r)return;
  const {doc,updateDoc,serverTimestamp,Timestamp}=NW.fb;
  const matchExp=Timestamp.fromMillis(nowMs()+MATCH_TTL*1000);
  await updateDoc(doc(NW.db,'nw_calls',curCallId),{
    status:'matched',matchedBizId:r.id,matchedBizName:r.bizName,matchedAt:serverTimestamp(),matchExpiresAt:matchExp});
  matchData={callId:curCallId,...r};cleanupCall();openMatched(nowMs()+MATCH_TTL*1000);
};
function openMatched(end){const r=matchData,c=catOf(r.cat||sel.cat);
  $('mName').textContent=r.bizName||'매장';
  $('mSub').textContent=r.type==='ok'?'지금 바로 입장 가능합니다':'약 10분 후 입장 가능합니다';
  $('mDetail').innerHTML=`<div class="row"><span>업종</span><b>${c.e} ${c.n}</b></div>
    <div class="row"><span>인원</span><b>${sel.party}명</b></div>
    <div class="row"><span>거리</span><b>${distLabel(r.dist)}</b></div>
    <div class="row"><span>상태</span><b style="color:${r.type==='ok'?'var(--ok)':'var(--soon)'}">${r.type==='ok'?'입장 가능':'10분 후'}</b></div>`;
  subShow('u-matched');clearInterval(matchTimer);
  const tick=()=>{const left=(end-nowMs())/1000;$('mTimer').textContent=fmtT(left);if(left<=0){clearInterval(matchTimer);noShow();}};
  tick();matchTimer=setInterval(tick,500);}
window.arrive=async()=>{clearInterval(matchTimer);
  if(matchData){const {doc,updateDoc,serverTimestamp}=NW.fb;await updateDoc(doc(NW.db,'nw_calls',matchData.callId),{status:'done',arrivedAt:serverTimestamp()}).catch(()=>{});}
  await saveHist('done');toast('도착 완료! 즐거운 시간 되세요 🎉');matchData=null;curCallId=null;subShow('u-home');};
window.cancelMatch=async()=>{clearInterval(matchTimer);
  if(matchData){const {doc,updateDoc}=NW.fb;await updateDoc(doc(NW.db,'nw_calls',matchData.callId),{status:'cancelled'}).catch(()=>{});}
  await saveHist('cancelled');matchData=null;curCallId=null;subShow('u-home');};
async function noShow(){
  const {doc,updateDoc,setDoc,Timestamp}=NW.fb;
  if(matchData)await updateDoc(doc(NW.db,'nw_calls',matchData.callId),{status:'noshow'}).catch(()=>{});
  penaltyUntil=nowMs()+PENALTY*1000;
  await setDoc(doc(NW.db,'nw_users',NW.uid),{penaltyUntil:Timestamp.fromMillis(penaltyUntil)},{merge:true}).catch(()=>{});
  await saveHist('noshow');matchData=null;curCallId=null;
  toast('시간 초과 — 노쇼 처리되어 30분 패널티가 적용됐어요.');renderPenaltyBanner();subShow('u-home');}

async function saveHist(status){if(!NW.uid)return;
  const {collection,addDoc,serverTimestamp}=NW.fb;
  await addDoc(collection(NW.db,'nw_users',NW.uid,'history'),{
    bizName:matchData?.bizName||'-',cat:sel.cat,party:sel.party,status,at:serverTimestamp()}).catch(()=>{});}
async function renderMy(){
  renderPenaltyBannerMy();
  if(!NW.uid){$('myHist').innerHTML='<div class="muted">로컬 모드</div>';return;}
  const {collection,getDocs,query,orderBy,limit}=NW.fb;
  const snap=await getDocs(query(collection(NW.db,'nw_users',NW.uid,'history'),orderBy('at','desc'),limit(20)));
  if(snap.empty){$('myHist').innerHTML='<div class="muted">아직 기록이 없어요.</div>';return;}
  const ST={done:['입장완료','var(--okbg)','var(--ok)'],noshow:['노쇼','var(--nobg)','var(--no)'],cancelled:['취소','var(--bg3)','var(--tx2)']};
  $('myHist').innerHTML=snap.docs.map(d=>{const v=d.data();const s=ST[v.status]||ST.cancelled;const c=catOf(v.cat);
    const t=v.at?.toDate?v.at.toDate():new Date();
    return `<div class="hist-item"><div class="hi-l"><b>${c.e} ${v.bizName}</b>
      <small>${v.party}명 · ${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}</small></div>
      <span class="hs" style="background:${s[1]};color:${s[2]}">${s[0]}</span></div>`;}).join('');}
function renderPenaltyBannerMy(){const el=$('myStatus');
  if(penalActive()){const left=Math.ceil((penaltyUntil-nowMs())/60000);
    el.innerHTML=`<div class="penalty"><div class="pi">⛔</div><div><b>노쇼 패널티 적용 중</b><div class="pt">약 ${left}분 후 해제</div></div></div>`;}
  else el.innerHTML=`<div class="statbox"><b style="color:var(--ok)">✓ 정상 이용 가능</b><div class="muted" style="margin-top:6px">패널티 없음</div></div>`;}
window.addEventListener('beforeunload',()=>{if(callUnsub)callUnsub();});
</script>
</body>
</html>
