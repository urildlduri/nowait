<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOWAIT · 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nw.css">
</head>
<body>
<div id="cfgWarn" class="hide"></div>

<div class="adm-top">
  <div style="display:flex;align-items:center;gap:14px">
    <a class="back" href="index.html" style="color:var(--tx2);font-weight:700">← 홈</a>
    <div class="lg">NO<span class="w">WAIT</span> <span style="font-size:13px;color:var(--tx3);font-weight:700">관리자</span></div>
  </div>
  <div class="live"><span class="d"></span>실시간 모니터링</div>
  <div id="acct"></div>
</div>

<div class="adm-wrap" id="admWrap" style="display:none">
  <div class="adm-stats">
    <div class="adm-stat live"><div class="n mono" id="sLive">0</div><div class="l">진행중 호출</div></div>
    <div class="adm-stat"><div class="n mono" id="sTotal">0</div><div class="l">총 호출</div></div>
    <div class="adm-stat"><div class="n mono" id="sMatch" style="color:var(--ok)">0</div><div class="l">성사</div></div>
    <div class="adm-stat"><div class="n mono" id="sNoshow" style="color:var(--no)">0</div><div class="l">노쇼</div></div>
    <div class="adm-stat"><div class="n mono" id="sRate" style="color:var(--info)">0%</div><div class="l">매칭률</div></div>
    <div class="adm-stat"><div class="n mono" id="sBiz">0</div><div class="l">등록 매장</div></div>
  </div>

  <div class="adm-tools">
    <button class="adm-btn" onclick="cleanFinished()">🧹 종료된 호출 정리</button>
    <button class="adm-btn" onclick="spawnDemo()">🧪 데모 매장 3개 생성(승인됨)</button>
    <button class="adm-btn danger" onclick="cleanDemo()">🗑 데모 매장 삭제</button>
    <button class="adm-btn danger" onclick="cleanAll()">⚠ 전체 호출 초기화</button>
    <a class="adm-btn" href="user.html" style="text-decoration:none">👁 사용자 앱 미리보기</a>
  </div>

  <!-- 파트너 승인 대기 -->
  <div class="adm-panel" style="margin-bottom:24px">
    <h3>🤝 파트너 신청 대기 <span class="cnt" id="pendCnt">0건</span></h3>
    <div class="adm-list" id="pendList"><div class="adm-empty">대기 중인 신청이 없습니다.</div></div>
  </div>

  <!-- 핫플 관리 -->
  <div class="adm-panel" style="margin-bottom:24px">
    <h3>🔥 이 주변 핫플 관리 <span class="cnt" id="hotCnt">0곳</span></h3>
    <div style="padding:16px 18px;border-bottom:1px solid var(--bd);display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <input class="inp" id="hName" placeholder="이름 *" style="margin:0">
      <input class="inp" id="hTag" placeholder="태그 (예: 웨이팅순삭)" style="margin:0">
      <input class="inp" id="hDesc" placeholder="한 줄 설명" style="margin:0;grid-column:1/3">
      <input class="inp" id="hPhoto" placeholder="사진 URL (선택)" style="margin:0">
      <input class="inp" id="hEmoji" placeholder="이모지 (사진 없을 때, 예: 🍜)" style="margin:0">
      <input class="inp" id="hLat" placeholder="위도 (선택)" style="margin:0">
      <input class="inp" id="hLng" placeholder="경도 (선택)" style="margin:0">
      <button class="adm-btn" style="grid-column:1/3;color:var(--y);border-color:var(--y)" onclick="addHot()">+ 핫플 추가</button>
      <button class="adm-btn" style="grid-column:1/3" onclick="useMyLoc()">📍 현재 위치를 위도·경도에 채우기</button>
    </div>
    <div class="adm-list" id="hotList"><div class="adm-empty">등록된 핫플이 없습니다.</div></div>
  </div>

  <div class="adm-grid">
    <div class="adm-panel">
      <h3>실시간 호출 피드 <span class="cnt" id="feedCnt">0건</span></h3>
      <div class="adm-list" id="feed"><div class="adm-empty">호출 대기 중…</div></div>
    </div>
    <div class="adm-panel">
      <h3>승인 매장 <span class="cnt" id="bizCnt">0곳</span></h3>
      <div class="adm-list" id="bizList"><div class="adm-empty">승인된 매장이 없습니다.</div></div>
    </div>
  </div>
</div>

<!-- 접근 거부 -->
<div id="denyScr" class="scr" style="min-height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px">
  <div style="font-size:64px">🔒</div>
  <div class="brand" style="font-size:26px;margin-top:16px">관리자 전용</div>
  <div class="muted" style="margin-top:12px">이 페이지는 NOWAIT 운영팀만 접근할 수 있어요.</div>
  <button class="cta ghost" style="max-width:240px;margin-top:28px" onclick="location.href='user.html'">사용자 앱으로 →</button>
  <button class="cta ghost" style="max-width:240px;margin-top:10px" onclick="NW.logout()">다른 계정으로 로그인</button>
</div>
<div id="toast"></div>

<script src="nw-core.js"></script>
<script>
const {$,toast,fmtT,distLabel,nowMs,tsMs,catOf}=NW;
let calls=[], biz=[];
let callsUnsub=null, bizUnsub=null;

const ST={
  searching:['탐색중','st-search'], matched:['매칭','st-match'], done:['입장완료','st-done'],
  noshow:['노쇼','st-noshow'], expired:['응답없음','st-expired'], cancelled:['취소','st-cancelled']
};
const BST={open:['영업중','st-open'],busy:['혼잡','st-busy'],closed:['마감','st-closed']};

(function init(){
  NW.onAuth(async u=>{
    if(!u){ location.href='index.html'; return; }
    if(!NW.isAdmin(u)){ $('admWrap').style.display='none'; $('denyScr').classList.add('on'); return; }
    $('admWrap').style.display=''; 
    NW.mountAccount('acct');
    if(!NW.cfgOk||!NW.fbLoaded){toast('Firebase 연결 필요');return;}
    listen();
    setInterval(render,1000);
  });
})();

function listen(){
  const {collection,onSnapshot,query,orderBy}=NW.fb;
  callsUnsub=onSnapshot(query(collection(NW.db,'nw_calls'),orderBy('createdAt','desc')),snap=>{
    calls=snap.docs.map(d=>({id:d.id,...d.data()}));render();
  },err=>{ // orderBy 인덱스 없을 때 fallback
    onSnapshot(collection(NW.db,'nw_calls'),s=>{calls=s.docs.map(d=>({id:d.id,...d.data()}));render();});
  });
  bizUnsub=onSnapshot(collection(NW.db,'nw_biz'),snap=>{
    biz=snap.docs.map(d=>({id:d.id,...d.data()}));renderBiz();
  });
  onSnapshot(collection(NW.db,'nw_hotplaces'),snap=>{
    hots=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order??0)-(b.order??0));
    renderHots();
  });
}
let hots=[];
function renderHots(){
  $('hotCnt').textContent=hots.length+'곳';
  if(!hots.length){$('hotList').innerHTML='<div class="adm-empty">등록된 핫플이 없습니다.</div>';return;}
  $('hotList').innerHTML=hots.map(h=>{
    const img=h.photo?`<img src="${h.photo}" style="width:38px;height:38px;border-radius:8px;object-fit:cover">`:`<div class="em">${h.emoji||'🔥'}</div>`;
    return `<div class="adm-row">${img}
      <div class="mid"><b>${h.name} ${h.tag?`<span style="color:var(--info);font-size:11px">#${h.tag}</span>`:''}</b>
      <small>${h.desc||''} ${h.lat?`· ${(+h.lat).toFixed(3)},${(+h.lng).toFixed(3)}`:''}</small></div>
      <button class="adm-btn danger" style="padding:6px 10px" onclick="delHot('${h.id}','${(h.name||'').replace(/'/g,'')}')">삭제</button></div>`;
  }).join('');
}
window.useMyLoc=()=>{
  if(!navigator.geolocation){toast('위치 불가');return;}
  navigator.geolocation.getCurrentPosition(p=>{$('hLat').value=p.coords.latitude.toFixed(6);$('hLng').value=p.coords.longitude.toFixed(6);toast('현재 위치 입력됨');},()=>toast('위치 권한 거부됨'));
};
window.addHot=async()=>{
  const name=$('hName').value.trim();
  if(!name){toast('이름을 입력하세요');return;}
  const {collection,addDoc,serverTimestamp}=NW.fb;
  await addDoc(collection(NW.db,'nw_hotplaces'),{
    name, tag:$('hTag').value.trim(), desc:$('hDesc').value.trim(),
    photo:$('hPhoto').value.trim(), emoji:$('hEmoji').value.trim()||'🔥',
    lat:parseFloat($('hLat').value)||null, lng:parseFloat($('hLng').value)||null,
    order:hots.length, createdAt:serverTimestamp()
  }).catch(e=>toast('추가 실패: '+e.message));
  ['hName','hTag','hDesc','hPhoto','hEmoji','hLat','hLng'].forEach(id=>$(id).value='');
  toast('🔥 핫플 추가 완료');
};
window.delHot=async(id,name)=>{
  if(!confirm(`"${name}" 핫플을 삭제할까요?`))return;
  const {doc,deleteDoc}=NW.fb;
  await deleteDoc(doc(NW.db,'nw_hotplaces',id)).catch(e=>toast('삭제 실패: '+e.message));
  toast('삭제 완료');
};

function isLive(c){return c.status==='searching' && (!c.expiresAt || tsMs(c.expiresAt)>nowMs());}

function render(){
  const live=calls.filter(isLive).length;
  const total=calls.length;
  const match=calls.filter(c=>['matched','done'].includes(c.status)).length;
  const noshow=calls.filter(c=>c.status==='noshow').length;
  const finished=calls.filter(c=>c.status!=='searching').length;
  const rate=finished? Math.round((match/finished)*100):0;
  $('sLive').textContent=live; $('sTotal').textContent=total;
  $('sMatch').textContent=match; $('sNoshow').textContent=noshow;
  $('sRate').textContent=rate+'%';
  renderFeed();
}
function renderFeed(){
  $('feedCnt').textContent=calls.length+'건';
  if(calls.length===0){$('feed').innerHTML='<div class="adm-empty">호출 대기 중…</div>';return;}
  $('feed').innerHTML=calls.slice(0,60).map(c=>{
    const cat=catOf(c.cat);const st=ST[c.status]||['?','st-expired'];
    const t=c.createdAt?.toDate?c.createdAt.toDate():null;
    const ts=t?`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`:'--';
    let extra='';
    if(isLive(c)){const left=(tsMs(c.expiresAt)-nowMs())/1000;extra=` · ⏱${fmtT(left)}`;}
    else if(c.status==='matched'&&c.matchExpiresAt){const left=(tsMs(c.matchExpiresAt)-nowMs())/1000;extra=left>0?` · 입장 ${fmtT(left)}`:' · 시간초과';}
    const where=c.matchedBizName?` → ${c.matchedBizName}`:'';
    return `<div class="adm-row"><div class="em">${cat.e}</div>
      <div class="mid"><b>${c.party}명 · ${cat.n}${where}</b><small>${ts}${extra} · ${c.id.slice(0,6)}</small></div>
      <span class="st ${st[1]}">${st[0]}</span></div>`;
  }).join('');
}
function renderBiz(){
  const pending=biz.filter(b=>!b.approved);
  const approved=biz.filter(b=>b.approved);
  // 대기 신청
  $('pendCnt').textContent=pending.length+'건';
  if(!pending.length){$('pendList').innerHTML='<div class="adm-empty">대기 중인 신청이 없습니다.</div>';}
  else $('pendList').innerHTML=pending.map(b=>{const cat=catOf(b.cat);
    return `<div class="adm-row"><div class="em">${cat.e}</div>
      <div class="mid"><b>${b.name||'매장'}</b>
      <small>${cat.n} · ${b.ownerName||b.ownerEmail||'?'} · ${(b.lat||0).toFixed(3)},${(b.lng||0).toFixed(3)}</small></div>
      <div style="display:flex;gap:6px">
        <button class="adm-btn" style="padding:7px 12px;color:var(--ok);border-color:var(--ok)" onclick="approve('${b.id}')">승인</button>
        <button class="adm-btn danger" style="padding:7px 12px" onclick="reject('${b.id}','${(b.name||'').replace(/'/g,'')}')">거절</button>
      </div></div>`;}).join('');
  // 승인 매장
  $('bizCnt').textContent=approved.length+'곳';$('sBiz').textContent=approved.length;
  if(!approved.length){$('bizList').innerHTML='<div class="adm-empty">승인된 매장이 없습니다.</div>';return;}
  $('bizList').innerHTML=approved.map(b=>{const cat=catOf(b.cat);const st=BST[b.status]||['?','st-closed'];
    return `<div class="adm-row"><div class="em">${cat.e}</div>
      <div class="mid"><b>${b.name||'매장'} ${b.demo?'<span style="color:var(--tx3);font-size:11px">[데모]</span>':''}</b>
      <small>${cat.n} · 반경 ${distLabel(b.radius||1000)} · ${b.ownerName||b.ownerEmail||'데모'}</small></div>
      <span class="st ${st[1]}" style="margin-right:8px">${st[0]}</span>
      <button class="adm-btn danger" style="padding:6px 10px" onclick="reject('${b.id}','${(b.name||'').replace(/'/g,'')}')">삭제</button></div>`;}).join('');
}

/* ── 파트너 승인/거절/삭제 ── */
window.approve=async(id)=>{
  const {doc,updateDoc}=NW.fb;
  await updateDoc(doc(NW.db,'nw_biz',id),{approved:true}).catch(e=>toast('승인 실패: '+e.message));
  toast('✓ 매장 승인 완료');
};
window.reject=async(id,name)=>{
  if(!confirm(`"${name||'이 매장'}"을(를) 삭제할까요?`))return;
  const {doc,deleteDoc}=NW.fb;
  await deleteDoc(doc(NW.db,'nw_biz',id)).catch(e=>toast('삭제 실패: '+e.message));
  toast('매장 삭제 완료');
};
/* 데모 매장(승인 상태) 생성 — 관리자 위치 기준 */
window.spawnDemo=async()=>{
  const loc=await new Promise(res=>{
    if(!navigator.geolocation){res(NW.FALLBACK);return;}
    navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),()=>res(NW.FALLBACK),{timeout:6000});
  });
  const {collection,addDoc,serverTimestamp}=NW.fb;
  const off=[[0.0012,0.0008],[-0.0009,0.0014],[0.0018,-0.0006]];
  const demos=[{name:'데모 라운지펍',cat:'pub'},{name:'데모 코인노래방',cat:'karaoke'},{name:'데모 방탈출 강남',cat:'escape'}];
  for(let i=0;i<demos.length;i++){
    await addDoc(collection(NW.db,'nw_biz'),{...demos[i],radius:2000,
      lat:loc.lat+off[i][0],lng:loc.lng+off[i][1],status:'open',approved:true,
      ownerId:'demo',demo:true,menu:NW.DEMO_MENU[demos[i].cat]||[],hours:NW.DEMO_HOURS,
      phone:'02-1234-567'+i,parking:i!==2,reservation:true,photo:'',createdAt:serverTimestamp()});}
  toast('데모 매장 3개 생성(승인됨) 완료');
};

/* ── 테스트용 정리 도구 ── */
async function delDocs(arr,col){
  const {doc,deleteDoc}=NW.fb;let n=0;
  for(const d of arr){await deleteDoc(doc(NW.db,col,d.id)).catch(()=>{});n++;}
  return n;
}
window.cleanFinished=async()=>{
  const target=calls.filter(c=>c.status!=='searching'&&c.status!=='matched');
  if(!target.length){toast('정리할 종료 호출이 없어요.');return;}
  if(!confirm(`종료된 호출 ${target.length}건을 삭제할까요?`))return;
  const n=await delDocs(target,'nw_calls');toast(`${n}건 정리 완료`);
};
window.cleanDemo=async()=>{
  const target=biz.filter(b=>b.demo);
  if(!target.length){toast('데모 매장이 없어요.');return;}
  if(!confirm(`데모 매장 ${target.length}곳을 삭제할까요?`))return;
  const n=await delDocs(target,'nw_biz');toast(`데모 매장 ${n}곳 삭제`);
};
window.cleanAll=async()=>{
  if(!calls.length){toast('호출이 없어요.');return;}
  if(!confirm(`전체 호출 ${calls.length}건을 모두 삭제할까요? (되돌릴 수 없음)`))return;
  const n=await delDocs(calls,'nw_calls');toast(`전체 ${n}건 초기화`);
};
window.addEventListener('beforeunload',()=>{if(callsUnsub)callsUnsub();if(bizUnsub)bizUnsub();});
</script>
</body>
</html>
