<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHdiga · 지금 어디가?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nw.css">
<style>
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
#splash .brand{font-size:60px;animation:pop .7s cubic-bezier(.2,1.2,.4,1)}
@keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.auth-inp{width:100%;max-width:340px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:12px;padding:14px 16px;font-size:15px;color:var(--tx);font-family:inherit;margin-bottom:10px;display:block;box-sizing:border-box;transition:.12s}
.auth-inp:focus{outline:none;border-color:var(--y)}
.auth-inp::placeholder{color:var(--tx3)}
.gbtn{background:#fff;color:#1f1f1f;font-weight:700;font-size:15px;padding:14px 22px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:12px;width:100%;max-width:340px;transition:.12s;border:1px solid var(--bd)}
.gbtn:active{transform:scale(.97)}
.gbtn svg{width:20px;height:20px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:10px;width:100%;max-width:340px;margin:18px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.divider span{font-size:11px;color:var(--tx3);white-space:nowrap}
</style>
</head>
<body>
<div id="cfgWarn" class="hide"></div>
<div id="splash"><div class="brand"><span class="w">Oh</span>diga</div></div>

<section id="loginScr" class="scr">
<div class="login-wrap">
  <div class="brand" style="font-size:48px"><span class="w">Oh</span>diga</div>
  <div class="brand-sub">지금 어디가?</div>

  <div style="margin-top:40px;width:100%;display:flex;flex-direction:column;align-items:center">

    <input class="auth-inp" id="loginId" type="text" placeholder="아이디 또는 이메일" autocomplete="username">
    <input class="auth-inp" id="loginPw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button class="cta" onclick="doLogin()" style="margin-top:4px;max-width:340px;width:100%">로그인</button>

    <div class="divider"><span>또는</span></div>

    <button class="gbtn" onclick="doGoogleLogin()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.6 13.2l7.9 6.2C12.3 13.7 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-4 6.8-9.9 6.8-17.4z"/><path fill="#FBBC05" d="M10.5 28.4c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.2C1 16.1 0 19.9 0 23.8s1 7.7 2.6 11l7.9-6.4z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.3-5.7c-2 1.4-4.7 2.3-8.6 2.3-6.3 0-11.7-4.2-13.5-9.9l-7.9 6.4C6.4 42.6 14.6 48 24 48z"/></svg>
      Google로 계속하기
    </button>

    <div class="divider"><span>처음이세요?</span></div>

    <button onclick="toggleSignup()" id="signupToggleBtn" style="background:none;border:1.5px solid var(--bd);color:var(--tx2);font-size:13px;font-weight:700;padding:12px 20px;border-radius:12px;width:100%;max-width:340px">✏️ 아이디로 회원가입</button>

    <div id="signupBox" class="hide" style="width:100%;max-width:340px;margin-top:14px">
      <input class="auth-inp" id="suName" type="text" placeholder="이름 또는 닉네임" autocomplete="name">
      <input class="auth-inp" id="suId" type="text" placeholder="아이디 (영문/숫자/_ 4~16자)" autocomplete="username" maxlength="16">
      <input class="auth-inp" id="suPw" type="password" placeholder="비밀번호 (8자 이상)" autocomplete="new-password">
      <input class="auth-inp" id="suPw2" type="password" placeholder="비밀번호 확인" autocomplete="new-password">
      <label style="display:flex;align-items:flex-start;gap:10px;margin:6px 0 14px;cursor:pointer;text-align:left">
        <input type="checkbox" id="suAgree" style="width:18px;height:18px;margin-top:2px;accent-color:var(--y);flex-shrink:0">
        <span style="font-size:12px;color:var(--tx2);line-height:1.5">
          <a href="terms.html" target="_blank" style="color:var(--y);font-weight:700">이용약관</a> 및
          <a href="privacy.html" target="_blank" style="color:var(--y);font-weight:700">개인정보처리방침</a>에 동의합니다
        </span>
      </label>
      <button class="cta" onclick="doSignup()" style="margin-top:0;width:100%">가입하기</button>
    </div>

    <div style="margin-top:20px;font-size:11px;color:var(--tx3);max-width:300px;line-height:1.6">
      🔒 매장 사장님은 발급받은 아이디로 로그인하세요
    </div>
  </div>
</div>
</section>

<div id="toast"></div>
<script src="nw-core.js"></script>
<script>
function showScr(id){
  document.querySelectorAll('body>.scr').forEach(s=>s.classList.remove('on'));
  NW.$(id).classList.add('on');
}

setTimeout(()=>{
  const sp=NW.$('splash');
  sp.style.opacity='0';
  setTimeout(()=>sp.style.display='none',500);
},1200);

NW.onAuth(async u=>{
  if(u) await afterLogin(u);
  else showScr('loginScr');
});

window.doLogin=async()=>{
  const id = NW.$('loginId').value.trim();
  const pw = NW.$('loginPw').value;
  if(!id||!pw){ NW.toast('아이디와 비밀번호를 입력해주세요'); return; }
  try{
    let u;
    if(id.includes('@')){
      await NW.fbReady;
      const res = await NW.fb.signInWithEmailAndPassword(NW.auth, id, pw);
      u=res.user; NW.uid=u.uid; NW.user=u;
      await NW.ensureProfile(u);
    }else{
      try{ u=await NW.merchantLogin(id,pw); }
      catch(e1){
        if(e1.code==='auth/invalid-credential'||e1.code==='auth/user-not-found'){
          u=await NW.userIdLogin(id,pw);
        }else throw e1;
      }
    }
    await afterLogin(u);
  }catch(e){
    const map={
      'auth/invalid-credential':'아이디 또는 비밀번호가 올바르지 않습니다',
      'auth/user-not-found':'등록되지 않은 아이디입니다',
      'auth/wrong-password':'비밀번호가 일치하지 않습니다',
      'auth/too-many-requests':'잠시 후 다시 시도해주세요',
      'auth/network-request-failed':'네트워크 오류'
    };
    NW.toast('로그인 실패: '+(map[e.code]||e.message));
  }
};

window.doGoogleLogin=async()=>{
  try{ await NW.googleLogin(); }
  catch(e){ NW.toast('구글 로그인 실패: '+(e.code||e.message)); }
};

window.toggleSignup=()=>{
  const box=NW.$('signupBox');
  box.classList.toggle('hide');
  NW.$('signupToggleBtn').textContent=box.classList.contains('hide')?'✏️ 아이디로 회원가입':'✏️ 회원가입 닫기';
};

window.doSignup=async()=>{
  const name=NW.$('suName').value.trim();
  const userId=NW.$('suId').value.trim();
  const pw=NW.$('suPw').value;
  const pw2=NW.$('suPw2').value;
  if(!name){ NW.toast('이름을 입력해주세요'); return; }
  if(!/^[a-zA-Z0-9_]{4,16}$/.test(userId)){ NW.toast('아이디는 영문/숫자/_ 4~16자여야 합니다'); return; }
  if(pw.length<8){ NW.toast('비밀번호는 8자 이상이어야 합니다'); return; }
  if(pw!==pw2){ NW.toast('비밀번호가 일치하지 않습니다'); return; }
  if(!NW.$('suAgree').checked){ NW.toast('약관 동의가 필요합니다'); return; }
  try{
    const u=await NW.userIdSignup({userId,password:pw,name});
    NW.toast('🎉 가입 완료! 환영합니다, '+name);
    setTimeout(()=>afterLogin(u),500);
  }catch(e){
    const map={'auth/email-already-in-use':'이미 사용 중인 아이디입니다','auth/weak-password':'비밀번호가 너무 약합니다'};
    NW.toast('가입 실패: '+(map[e.code]||e.message));
  }
};

async function afterLogin(u){
  if(NW.isAdmin(u)){ location.replace('admin.html'); return; }
  const biz=await NW.myBusiness();
  if(biz&&biz.approved){ location.replace('merchant.html'); return; }
  location.replace('user.html');
}
</script>
</body>
</html>
