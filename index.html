<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOWAIT · 지금, 바로 갈 수 있는 곳</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nw.css">
<style>
#splash{position:fixed;inset:0;background:#0E0E10;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
#splash .brand{font-size:60px;animation:pop .7s cubic-bezier(.2,1.2,.4,1)}
@keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
.gbtn{background:#fff;color:#1f1f1f;font-weight:700;font-size:16px;padding:15px 22px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:12px;width:100%;max-width:340px;transition:.12s}
.gbtn:active{transform:scale(.97)}
.gbtn svg{width:20px;height:20px}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.me-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:30px;padding:6px 8px 6px 14px;margin-bottom:30px}
.me-bar img{width:30px;height:30px;border-radius:50%}
.me-bar .nm{font-size:13px;font-weight:700}
.me-bar .lo{font-size:12px;color:var(--tx3);background:var(--bg3);padding:6px 10px;border-radius:20px;font-weight:700}
</style>
</head>
<body>
<div id="cfgWarn" class="hide"></div>

<div id="splash"><div class="brand">NO<span class="w">WAIT</span></div></div>

<!-- 로그인 화면 -->
<section id="loginScr" class="scr login-wrap">
  <div class="brand">NO<span class="w">WAIT</span></div>
  <div class="brand-sub">지금, 바로 갈 수 있는 곳</div>
  <div style="margin-top:48px;width:100%;display:flex;flex-direction:column;align-items:center">
    <button class="gbtn" onclick="doLogin()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.6 13.2l7.9 6.2C12.3 13.7 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-4 6.8-9.9 6.8-17.4z"/><path fill="#FBBC05" d="M10.5 28.4c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.2C1 16.1 0 19.9 0 23.8s1 7.7 2.6 11l7.9-6.4z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.3-5.7c-2 1.4-4.7 2.3-8.6 2.3-6.3 0-11.7-4.2-13.5-9.9l-7.9 6.4C6.4 42.6 14.6 48 24 48z"/></svg>
      Google로 계속하기
    </button>
    <div class="muted" style="margin-top:18px;font-size:12px;max-width:300px">로그인하면 서비스 이용약관 및 개인정보 처리방침에 동의하게 됩니다.</div>
  </div>
</section>

<!-- 역할 선택 (로그인 후) -->
<section id="roleScr" class="scr login-wrap">
  <div class="me-bar"><img id="meImg" src="" alt=""><span class="nm" id="meName">·</span>
    <button class="lo" onclick="NW.logout()">로그아웃</button></div>
  <div class="brand" style="font-size:34px">어디로 가시겠어요?</div>
  <div class="hub-cards">
    <a class="hub-card usr" href="user.html"><div class="ico">🙋</div>
      <div><h3>사용자용</h3><p>지금 갈 곳을 찾고 호출해요</p></div></a>
    <a class="hub-card" id="merchCard" href="merchant.html"><div class="ico">🏪</div>
      <div><h3 id="merchTitle">매장용 (점주)</h3><p id="merchDesc">호출을 받고 1탭 응답</p></div></a>
    <a class="hub-card hide" id="adminCard" href="admin.html"><div class="ico">📊</div>
      <div><h3>관리자용</h3><p>파트너 승인·실시간 모니터링</p></div></a>
  </div>
  <div class="ver">v2.0 · Google 로그인</div>
</section>

<div id="toast"></div>
<script src="nw-core.js"></script>
<script>
const {$}=NW;
function showScr(id){document.querySelectorAll('body>.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}

// 스플래시 1.2초 후 페이드아웃 → 로그인 상태 확인
setTimeout(()=>{const sp=$('splash');sp.style.opacity='0';setTimeout(()=>sp.style.display='none',500);},1200);

NW.onAuth(async u=>{
  if(u){ await afterLogin(u); }
  else { showScr('loginScr'); }
});

window.doLogin=async()=>{
  try{ const u=await NW.googleLogin(); await afterLogin(u); }
  catch(e){ NW.toast('로그인 실패: '+(e.code||e.message)); }
};

async function afterLogin(u){
  $('meImg').src=u.photoURL||''; $('meName').textContent=u.displayName||u.email;
  // 관리자면 관리자 카드 노출
  if(NW.isAdmin(u)) $('adminCard').classList.remove('hide');
  // 매장 신청 상태 반영
  const biz=await NW.myBusiness();
  if(biz){
    if(biz.approved){$('merchTitle').textContent='매장 콘솔 (승인됨)';$('merchDesc').textContent=biz.name+' · 호출 받기';}
    else{$('merchTitle').textContent='매장 신청 검토중';$('merchDesc').textContent='관리자 승인을 기다리고 있어요';}
  }
  showScr('roleScr');
}
</script>
</body>
</html>
