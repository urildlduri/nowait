<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHdiga · 지금 어디가?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nw.css">
<style>
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
#splash .brand{font-size:60px;animation:pop .7s cubic-bezier(.2,1.2,.4,1)}
@keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
.gbtn{background:#fff;color:#1f1f1f;font-weight:700;font-size:16px;padding:15px 22px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:12px;width:100%;max-width:340px;transition:.12s;border:1px solid var(--bd);box-shadow:0 2px 6px rgba(0,0,0,.04)}
.gbtn:active{transform:scale(.97)}
.gbtn svg{width:20px;height:20px}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.me-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:30px;padding:6px 8px 6px 14px;margin-bottom:30px}
.me-bar img{width:30px;height:30px;border-radius:50%}
.me-bar .nm{font-size:13px;font-weight:700}
.me-bar .lo{font-size:12px;color:var(--tx3);background:var(--bg3);padding:6px 10px;border-radius:20px;font-weight:700}
.auth-inp{width:100%;background:var(--bg2);border:1.5px solid var(--bd);border-radius:12px;padding:14px 16px;font-size:15px;color:var(--tx);font-family:inherit;margin-bottom:10px;transition:.12s}
.auth-inp:focus{outline:none;border-color:var(--y)}
</style>
</head>
<body>
<div id="cfgWarn" class="hide"></div>

<div id="splash"><div class="brand"><span class="w">Oh</span>diga</div></div>

<!-- 로그인 화면 -->
<section id="loginScr" class="scr login-wrap">
  <div class="brand"><span class="w">Oh</span>diga</div>
  <div class="brand-sub">지금 어디가?</div>
  <div style="margin-top:48px;width:100%;display:flex;flex-direction:column;align-items:center">
    <label style="display:flex;align-items:flex-start;gap:10px;max-width:340px;margin-bottom:14px;cursor:pointer">
      <input type="checkbox" id="agree" style="width:18px;height:18px;margin-top:2px;accent-color:var(--y)">
      <span style="font-size:13px;color:var(--tx2);line-height:1.5;text-align:left">
        <a href="terms.html" target="_blank" style="color:var(--y);font-weight:700">이용약관</a> 및 
        <a href="privacy.html" target="_blank" style="color:var(--y);font-weight:700">개인정보처리방침</a>에 동의합니다 (필수)</span>
    </label>
    <button class="gbtn" onclick="doLogin()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.6 13.2l7.9 6.2C12.3 13.7 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-4 6.8-9.9 6.8-17.4z"/><path fill="#FBBC05" d="M10.5 28.4c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.2C1 16.1 0 19.9 0 23.8s1 7.7 2.6 11l7.9-6.4z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.3-5.7c-2 1.4-4.7 2.3-8.6 2.3-6.3 0-11.7-4.2-13.5-9.9l-7.9 6.4C6.4 42.6 14.6 48 24 48z"/></svg>
      Google로 계속하기
    </button>
    <div class="muted" style="margin-top:18px;font-size:12px;max-width:300px">로그인 시 Google 계정 정보(이름·이메일·프로필)를 수집해 회원 식별에 사용합니다.</div>

    <div style="display:flex;align-items:center;gap:10px;width:100%;max-width:340px;margin-top:26px">
      <div style="flex:1;height:1px;background:var(--bd)"></div>
      <span style="font-size:11px;color:var(--tx3)">사장님이신가요?</span>
      <div style="flex:1;height:1px;background:var(--bd)"></div>
    </div>
    <button onclick="toggleMerchantLogin()" style="margin-top:14px;background:none;border:1px solid var(--bd);color:var(--tx2);font-size:13px;font-weight:700;padding:12px 20px;border-radius:12px;width:100%;max-width:340px">🏪 매장 아이디로 로그인</button>

    <div id="merchantLoginBox" class="hide" style="width:100%;max-width:340px;margin-top:14px">
      <input class="auth-inp" id="mLoginId" type="text" placeholder="매장 아이디" autocomplete="username">
      <input class="auth-inp" id="mLoginPw" type="password" placeholder="비밀번호" autocomplete="current-password">
      <button class="cta" onclick="doMerchantLogin()" style="margin-top:4px">매장 로그인</button>
    </div>
  </div>
</section>

<!-- 로그인 후 자동 분기 (index.html은 라우터 역할만) -->

<div id="toast"></div>
<script src="nw-core.js"></script>
<script>
const {$}=NW;
function showScr(id){document.querySelectorAll('body>.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}

// 스플래시 1.2초 후 페이드아웃 → 로그인 상태 확인
setTimeout(()=>{const sp=$('splash');sp.style.opacity='0';setTimeout(()=>sp.style.display='none',500);},1200);

NW.onAuth(async u=>{
  if(u){ await afterLogin(u); }
  else { showScr('loginScr'); }
});

window.doLogin=async()=>{
  if(!$('agree').checked){ NW.toast('약관·개인정보처리방침 동의가 필요해요'); return; }
  try{ const u=await NW.googleLogin(); await afterLogin(u); }
  catch(e){ NW.toast('로그인 실패: '+(e.code||e.message)); }
};

window.toggleMerchantLogin=()=>{
  $('merchantLoginBox').classList.toggle('hide');
};

window.doMerchantLogin=async()=>{
  const id = $('mLoginId').value.trim();
  const pw = $('mLoginPw').value;
  if(!id || !pw){ NW.toast('아이디와 비밀번호를 입력해주세요'); return; }
  try{
    const u = await NW.merchantLogin(id, pw);
    await afterLogin(u);
  }catch(e){
    const map = {
      'auth/user-not-found':'등록되지 않은 아이디입니다',
      'auth/wrong-password':'비밀번호가 일치하지 않습니다',
      'auth/invalid-credential':'아이디 또는 비밀번호가 올바르지 않습니다',
      'auth/too-many-requests':'너무 많은 시도가 있었어요. 잠시 후 다시 시도해주세요'
    };
    NW.toast('로그인 실패: '+(map[e.code]||e.message));
  }
};

async function afterLogin(u){
  // 역할 자동 분기
  if(NW.isAdmin(u)){ location.replace('admin.html'); return; }
  const biz=await NW.myBusiness();
  if(biz && biz.approved){ location.replace('merchant.html'); return; }
  // 그 외 전부 사용자 앱
  location.replace('user.html');
}
</script>
</body>
</html>
